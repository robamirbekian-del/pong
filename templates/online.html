<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PONG — Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
            pointer-events: none;
            z-index: 50;
        }

        /* ── Waiting screen ── */
        #waiting-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        #waiting-screen h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            letter-spacing: 0.2em;
        }

        #status-text {
            font-size: 14px;
            letter-spacing: 0.3em;
            color: #888;
        }

        /* Ping pong animation */
        .court-anim {
            width: 300px;
            height: 60px;
            position: relative;
            border-left: 3px solid #333;
            border-right: 3px solid #333;
        }

        .paddle-left, .paddle-right {
            position: absolute;
            width: 6px;
            height: 40px;
            background: #fff;
            top: 50%;
            transform: translateY(-50%);
        }
        .paddle-left { left: 0; }
        .paddle-right { right: 0; }

        .anim-ball {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #fff;
            top: 50%;
            transform: translateY(-50%);
            animation: bounce 1.4s linear infinite;
        }

        @keyframes bounce {
            0%   { left: 10px; }
            50%  { left: calc(100% - 20px); }
            100% { left: 10px; }
        }

        .dots span {
            animation: blink 1.2s step-end infinite;
            font-size: 24px;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink { 50% { opacity: 0; } }

        #back-link {
            font-size: 12px;
            letter-spacing: 0.2em;
            color: #444;
            text-decoration: none;
            margin-top: 16px;
            transition: color 0.15s;
        }
        #back-link:hover { color: #fff; }

        /* ── Game screen ── */
        #game-screen { display: none; flex-direction: column; align-items: center; }

        #player-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 0.3em;
            color: #f5e642;
            margin-bottom: 12px;
        }

        #game-container {
            width: 800px;
            height: 400px;
            position: relative;
        }

        #game-container canvas {
            position: relative !important;
            top: auto !important;
            left: auto !important;
        }

        #below-game {
            width: 800px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #high-score {
            font-size: 20px;
            letter-spacing: 0.1em;
        }

        #high-score span { color: #f5e642; }

        #disconnect-msg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        #disconnect-msg h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            letter-spacing: 0.2em;
            color: #f5e642;
        }

        #disconnect-msg a {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 0.2em;
            color: #fff;
            text-decoration: none;
            border: 1px solid #555;
            padding: 12px 28px;
            transition: border-color 0.15s;
        }

        #disconnect-msg a:hover { border-color: #fff; }

        #stats {
            display: flex;
            justify-content: space-between;
            border: 1px solid #222;
            margin-top: 20px;
            width: 800px;
        }
        .stat-player { flex: 1; padding: 20px; }
        .stat-player:first-child { border-right: 1px solid #222; }
        .stat-player h3 {
            font-size: 13px;
            letter-spacing: 0.3em;
            color: #888;
            margin-bottom: 16px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 4px;
        }
        .stat-label { color: #555; letter-spacing: 0.1em; }
        .stat-value { color: #fff; font-size: 16px; }
        .stat-value.good { color: #4cff91; }
        .stat-value.bad  { color: #ff4c4c; }
        .stat-bar-wrap { height: 4px; background: #111; margin-bottom: 14px; }
        .stat-bar { height: 100%; background: #444; transition: width 0.4s ease; }
        .stat-bar.good { background: #4cff91; }
        .stat-bar.bad  { background: #ff4c4c; }
    </style>
</head>
<body>

<!-- Waiting for match -->
<div id="waiting-screen">
    <h1>ONLINE PLAY</h1>
    <div class="court-anim">
        <div class="paddle-left"></div>
        <div class="anim-ball"></div>
        <div class="paddle-right"></div>
    </div>
    <div id="status-text">SEARCHING FOR OPPONENT <span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
    <a href="/" id="back-link">← Cancel</a>
</div>

<!-- Game -->
<div id="game-screen">
    <div id="player-label"></div>
    <div id="game-container"></div>
    <div id="below-game">
        <div id="high-score">GLOBAL HIGH SCORE: <span id="high-score-value">0</span></div>
    </div>

    <div id="stats">
        <div class="stat-player">
            <h3>YOU</h3>
            <div class="stat-row">
                <span class="stat-label">SCORED</span>
                <span class="stat-value good" id="my-score-rate">0%</span>
            </div>
            <div class="stat-bar-wrap"><div class="stat-bar good" id="my-score-bar" style="width:0%"></div></div>
            <div class="stat-row">
                <span class="stat-label">MISSED</span>
                <span class="stat-value bad" id="my-miss-rate">0%</span>
            </div>
            <div class="stat-bar-wrap"><div class="stat-bar bad" id="my-miss-bar" style="width:0%"></div></div>
        </div>
        <div class="stat-player">
            <h3>OPPONENT</h3>
            <div class="stat-row">
                <span class="stat-label">SCORED</span>
                <span class="stat-value good" id="op-score-rate">0%</span>
            </div>
            <div class="stat-bar-wrap"><div class="stat-bar good" id="op-score-bar" style="width:0%"></div></div>
            <div class="stat-row">
                <span class="stat-label">MISSED</span>
                <span class="stat-value bad" id="op-miss-rate">0%</span>
            </div>
            <div class="stat-bar-wrap"><div class="stat-bar bad" id="op-miss-bar" style="width:0%"></div></div>
        </div>
    </div>
</div>

<!-- Opponent disconnected overlay -->
<div id="disconnect-msg">
    <h2>OPPONENT DISCONNECTED</h2>
    <a href="/online">Find New Game</a>
    <a href="/">Home</a>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const CANVAS_W = 800, CANVAS_H = 400;
const PADDLE_W = 12, PADDLE_H = 90, PADDLE_SPEED = 7;
const BALL_SIZE = 14;

// ── State ────────────────────────────────────────────────────────────────────
let socket;
let myPlayerNumber = null;   // 1 = left, 2 = right
let gameStarted = false;

let myPaddleY, opponentPaddleY;
let myPaddleSpeed = 0;

let ballX, ballY, ballSpeedX, ballSpeedY;
let myScore = 0, opponentScore = 0;
let highScore = 0;
let myScored = 0, myMissed = 0, opScored = 0, opMissed = 0;

// ── Socket setup ─────────────────────────────────────────────────────────────
function initSocket() {
    socket = io();

    socket.on('connect', () => {
        socket.emit('find_game');
    });

    socket.on('waiting', () => {
        document.getElementById('status-text').innerHTML =
            'WAITING FOR OPPONENT <span class="dots"><span>.</span><span>.</span><span>.</span></span>';
    });

    socket.on('game_start', (data) => {
        myPlayerNumber = data.player;
        document.getElementById('waiting-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        document.getElementById('player-label').textContent =
            myPlayerNumber === 1 ? 'YOU ARE PLAYER 1 — LEFT PADDLE (W / S)' : 'YOU ARE PLAYER 2 — RIGHT PADDLE (↑ / ↓)';
        gameStarted = true;
        fetchHighScore();
    });

    socket.on('opponent_paddle', (data) => {
        opponentPaddleY = data.y;
    });

    socket.on('ball_sync', (data) => {
        if (myPlayerNumber === 2) {
            // Mirror ball X for player 2
            ballX = CANVAS_W - data.x - BALL_SIZE;
            ballY = data.y;
        }
    });

    socket.on('score_sync', (data) => {
        if (myPlayerNumber === 2) {
            myScore = data.p2;
            opponentScore = data.p1;
            updateHighScoreDisplay();
        }
    });

    socket.on('opponent_disconnected', () => {
        document.getElementById('disconnect-msg').style.display = 'flex';
    });
}

// ── High score ───────────────────────────────────────────────────────────────
function fetchHighScore() {
    fetch('/highscore')
        .then(r => r.json())
        .then(d => {
            highScore = d.highScore;
            document.getElementById('high-score-value').textContent = highScore;
        });
}

function updateHighScoreDisplay() {
    let best = Math.max(myScore, opponentScore);
    if (best > highScore) {
        highScore = best;
        fetch('/highscore', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ score: best })
        }).then(r => r.json()).then(d => {
            highScore = d.highScore;
            document.getElementById('high-score-value').textContent = highScore;
        });
    }
}

function updateStats() {
    let total = myScored + myMissed;
    function pct(n) { return total === 0 ? 0 : Math.round((n / total) * 100); }
    let mySP = pct(myScored), myMP = pct(myMissed);
    let opSP = pct(opScored), opMP = pct(opMissed);
    document.getElementById('my-score-rate').textContent = mySP + '%';
    document.getElementById('my-miss-rate').textContent  = myMP + '%';
    document.getElementById('op-score-rate').textContent = opSP + '%';
    document.getElementById('op-miss-rate').textContent  = opMP + '%';
    document.getElementById('my-score-bar').style.width = mySP + '%';
    document.getElementById('my-miss-bar').style.width  = myMP + '%';
    document.getElementById('op-score-bar').style.width = opSP + '%';
    document.getElementById('op-miss-bar').style.width  = opMP + '%';
}

// ── p5.js sketch ─────────────────────────────────────────────────────────────
new p5(function(p) {

    p.setup = function() {
        let canvas = p.createCanvas(CANVAS_W, CANVAS_H);
        canvas.parent('game-container');

        window.addEventListener('keydown', e => {
            if ([37,38,39,40].includes(e.keyCode)) e.preventDefault();
        });

        myPaddleY = CANVAS_H / 2 - PADDLE_H / 2;
        opponentPaddleY = CANVAS_H / 2 - PADDLE_H / 2;
        resetBall(p);
        initSocket();
    };

    p.draw = function() {
        p.background(0);
        if (!gameStarted) return;

        handleInput(p);
        if (myPlayerNumber === 1) {
            moveBall(p);
            checkCollisions(p);
            // Send ball state to server for player 2
            socket.emit('ball_update', { x: ballX, y: ballY });
            socket.emit('score_update', { p1: myScore, p2: opponentScore });
        }

        drawCenterLine(p);
        drawPaddles(p);
        drawBall(p);
        drawScore(p);
    };

    function handleInput(p) {
        myPaddleSpeed = 0;

        // Player 1 uses W/S, Player 2 uses arrow keys
        let upKey   = myPlayerNumber === 1 ? 87 : p.UP_ARROW;
        let downKey = myPlayerNumber === 1 ? 83 : p.DOWN_ARROW;

        if (p.keyIsDown(upKey))   { myPaddleY -= PADDLE_SPEED; myPaddleSpeed = -PADDLE_SPEED; }
        if (p.keyIsDown(downKey)) { myPaddleY += PADDLE_SPEED; myPaddleSpeed = PADDLE_SPEED; }

        myPaddleY = p.constrain(myPaddleY, 0, CANVAS_H - PADDLE_H);

        // Send my paddle position to server
        socket.emit('paddle_move', { y: myPaddleY });
    }

    function moveBall(p) {
        ballX += ballSpeedX;
        ballY += ballSpeedY;

        if (ballY <= 0 || ballY >= CANVAS_H - BALL_SIZE) {
            ballSpeedY *= -1;
        }

        if (ballX < 0) {
            opponentScore++;
            myMissed++;
            opScored++;
            updateHighScoreDisplay();
            updateStats();
            resetBall(p);
        }
        if (ballX > CANVAS_W) {
            myScore++;
            myScored++;
            opMissed++;
            updateHighScoreDisplay();
            updateStats();
            resetBall(p);
        }
    }

    function checkCollisions(p) {
        // My paddle is always on the left from player 1's perspective
        let leftY  = myPaddleY;
        let rightY = opponentPaddleY;

        if (ballX <= PADDLE_W &&
            ballY + BALL_SIZE >= leftY &&
            ballY <= leftY + PADDLE_H) {
            let res = collideBall(p, ballSpeedX, ballSpeedY, myPaddleSpeed);
            ballSpeedX = res.x; ballSpeedY = res.y;
            ballX = PADDLE_W;
        }

        if (ballX + BALL_SIZE >= CANVAS_W - PADDLE_W &&
            ballY + BALL_SIZE >= rightY &&
            ballY <= rightY + PADDLE_H) {
            let res = collideBall(p, ballSpeedX, ballSpeedY, 0);
            ballSpeedX = res.x; ballSpeedY = res.y;
            ballX = CANVAS_W - PADDLE_W - BALL_SIZE;
        }
    }

    function collideBall(p, bsx, bsy, paddleSpeed) {
        let nx = -bsx * 1.03;
        let ny = bsy + paddleSpeed * 0.4 + p.random(-0.6, 0.6);
        ny = p.constrain(ny, -9, 9);
        return { x: nx, y: ny };
    }

    function drawPaddles(p) {
        p.noStroke();
        p.fill(255);
        // My paddle always on left visually, opponent on right
        if (myPlayerNumber === 1) {
            p.rect(0, myPaddleY, PADDLE_W, PADDLE_H);
            p.rect(CANVAS_W - PADDLE_W, opponentPaddleY, PADDLE_W, PADDLE_H);
        } else {
            p.rect(0, opponentPaddleY, PADDLE_W, PADDLE_H);
            p.rect(CANVAS_W - PADDLE_W, myPaddleY, PADDLE_W, PADDLE_H);
        }
    }

    function drawBall(p) {
        p.noStroke();
        p.fill(255);
        p.rect(ballX, ballY, BALL_SIZE, BALL_SIZE);
    }

    function drawCenterLine(p) {
        p.stroke(255);
        for (let y = 0; y < CANVAS_H; y += 20) {
            p.line(CANVAS_W / 2, y, CANVAS_W / 2, y + 10);
        }
        p.noStroke();
    }

    function drawScore(p) {
        p.textAlign(p.CENTER, p.CENTER);
        p.textSize(32);
        p.fill(255);
        // My score on left, opponent on right
        p.text(myScore, CANVAS_W / 4, 40);
        p.text(opponentScore, CANVAS_W * 3 / 4, 40);
    }

    function resetBall(p) {
        ballX = CANVAS_W / 2;
        ballY = CANVAS_H / 2;
        ballSpeedX = p.random([-5, 5]);
        ballSpeedY = p.random(1.5, 4) * p.random([-1, 1]);
    }
});
</script>
</body>
</html>
