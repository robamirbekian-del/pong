<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PONG</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>

        :root {
            --white: #ffffff;
            --yellow: #f5e642;
            --dim: #888;
            --bg: #000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Scanline overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
            z-index: 100;
        }

        {% if flask_env == 'development' %}
        body { background: #00008b; } /* testing development branch background */
        {% endif %}

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
            padding: 40px;
        }

        /* Animated title */
        .title-wrap {
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(80px, 15vw, 140px);
            font-weight: 900;
            letter-spacing: 0.15em;
            line-height: 1;
            color: var(--white);
            text-shadow:
                0 0 20px rgba(255,255,255,0.8),
                0 0 60px rgba(255,255,255,0.4),
                0 0 120px rgba(255,255,255,0.2);
            animation: flicker 6s infinite;
        }

        @keyframes flicker {
            0%, 95%, 100% { opacity: 1; }
            96% { opacity: 0.7; }
            97% { opacity: 1; }
            98% { opacity: 0.5; }
            99% { opacity: 1; }
        }

        .subtitle {
            font-size: 14px;
            letter-spacing: 0.4em;
            color: var(--dim);
            margin-top: 12px;
            text-transform: uppercase;
        }

        /* Buttons */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 360px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 20px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-decoration: none;
            text-align: center;
            text-transform: uppercase;
            border: 2px solid var(--white);
            color: var(--bg);
            background: var(--white);
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--yellow);
            transform: translateX(-100%);
            transition: transform 0.2s ease;
            z-index: 0;
        }

        .btn:hover::before { transform: translateX(0); }

        .btn span {
            position: relative;
            z-index: 1;
        }

        .btn:hover {
            color: var(--bg);
            border-color: var(--yellow);
        }

        .btn.outline {
            background: transparent;
            color: var(--white);
            border-color: #444;
        }

        .btn.outline::before {
            background: #222;
        }

        .btn.outline:hover {
            color: var(--white);
            border-color: #666;
        }

        /* Court divider decoration */
        .court {
            display: flex;
            align-items: center;
            gap: 0;
            width: 360px;
        }

        .court-line {
            flex: 1;
            height: 2px;
            background: #222;
        }

        .court-center {
            width: 2px;
            height: 40px;
            background: repeating-linear-gradient(
                to bottom,
                #444 0px,
                #444 6px,
                transparent 6px,
                transparent 12px
            );
            margin: 0 20px;
        }

        /* How to play */
        .how-to-play {
            width: 360px;
            border-top: 1px solid #222;
            padding-top: 32px;
        }

        .how-to-play h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 0.4em;
            color: var(--dim);
            margin-bottom: 24px;
            text-align: center;
        }

        .controls {
            display: flex;
            justify-content: space-between;
        }

        .player-controls {
            text-align: center;
        }

        .player-controls h3 {
            font-size: 11px;
            letter-spacing: 0.2em;
            color: var(--dim);
            margin-bottom: 12px;
        }

        .key-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            justify-content: center;
        }

        kbd {
            background: #111;
            border: 1px solid #333;
            border-bottom: 2px solid #444;
            border-radius: 3px;
            padding: 3px 8px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: var(--yellow);
            min-width: 28px;
            text-align: center;
        }

        .note {
            text-align: center;
            font-size: 11px;
            color: #444;
            margin-top: 24px;
            letter-spacing: 0.1em;
            line-height: 1.8;
        }

        /* Ball animation */
        .ball {
            position: fixed;
            width: 10px;
            height: 10px;
            background: white;
            opacity: 0.06;
            animation: moveball 8s linear infinite;
        }

        @keyframes moveball {
            0%   { transform: translate(0vw, 30vh); }
            25%  { transform: translate(90vw, 60vh); }
            50%  { transform: translate(50vw, 10vh); }
            75%  { transform: translate(10vw, 80vh); }
            100% { transform: translate(0vw, 30vh); }
        }
    </style>
</head>
<body>

<div class="ball"></div>

<div class="container">
    <div class="title-wrap">
        <h1>PONG</h1>
        <p class="subtitle">Classic Arcade &mdash; Est. 1972</p>
    </div>

    <div class="buttons">
        <a href="/game" class="btn"><span>2 Player Local</span></a>
        <a href="/online" class="btn outline"><span>Online Play</span></a>
    </div>

    <div class="court">
        <div class="court-line"></div>
        <div class="court-center"></div>
        <div class="court-line"></div>
    </div>

    <div class="how-to-play">
        <h2>How to Play</h2>
        <div class="controls">
            <div class="player-controls">
                <h3>Player 1</h3>
                <div class="key-row"><kbd>W</kbd> Move Up</div>
                <div class="key-row"><kbd>S</kbd> Move Down</div>
            </div>
            <div class="player-controls">
                <h3>Player 2</h3>
                <div class="key-row"><kbd>↑</kbd> Move Up</div>
                <div class="key-row"><kbd>↓</kbd> Move Down</div>
            </div>
        </div>
        <p class="note">Don't let the ball get past your paddle.<br>First to miss gives the other a point.</p>
    </div>
</div>

</body>
</html>
